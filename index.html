<!DOCTYPE html>
<html>
<head>
<title>Mouse Events</title>

<script>
function mouseOver() {
    let el = document.getElementById("box");
    el.style.backgroundColor = "green";
    el.style.color = "white";
    document.getElementById("msg").innerHTML = "Mouse Over Event Triggered";
}

function mouseOut() {
    let el = document.getElementById("box");
    el.style.backgroundColor = "lightgray";
    el.style.color = "black";
    document.getElementById("msg").innerHTML = "Mouse Out Event Triggered";
}

function mouseClick() {
    document.getElementById("msg").innerHTML = "Mouse Click Event Triggered";
}
</script>

</head>

<body>

<h2>Mouse Events Demo</h2>

<div id="box"
     onmouseover="mouseOver()"
     onmouseout="mouseOut()"
     onclick="mouseClick()"
     style="width:200px; padding:20px; background:lightgray; text-align:center; cursor:pointer;">
     Move Mouse Here
</div>

<p id="msg"></p>

</body>
</html>
